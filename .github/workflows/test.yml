name: Test

on: push

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: scripts/analyze-and-improve
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 26
          cache: npm
          cache-dependency-path: scripts/analyze-and-improve/package-lock.json
      - run: npm ci
      - run: npm test
